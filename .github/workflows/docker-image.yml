name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Dockerhub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
   
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:latest

    - name: Push the Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          script: |
            rm -rf production-cicd-platform
            git clone https://github.com/HARSAWASTHI/production-cicd-platform.git
            cd /production-cicd-platform/infra 
            docker-compose pull
            docker-compose up -d